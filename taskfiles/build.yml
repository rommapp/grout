version: '3'

tasks:

  _build:
    internal: true
    silent: true
    vars:
      LOCAL: "false"
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - echo "Building {{.PLATFORM}}..."
      - '{{if eq .LOCAL "true"}}cd .. && {{end}}docker buildx build {{.NO_CACHE}} --load --platform={{.PLATFORM}} --build-arg GITHUB_ACTIONS=false {{.VERSION_ARG}} {{if eq .LOCAL "true"}}--build-arg USE_LOCAL_GABAGOOL=true {{end}}--label {{.LABEL}} -t {{.IMAGE_TAG}} -f {{if eq .LOCAL "true"}}grout/{{end}}{{.DOCKERFILE}} . > {{.BUILD_DIR}}.log 2>&1 || (cat {{.BUILD_DIR}}.log && exit 1)'
      - echo "Build {{.PLATFORM}} complete"

  _extract:
    internal: true
    silent: true
    cmds:
      - mkdir -p {{.BUILD_DIR}}/lib
      - docker rm {{.CONTAINER_NAME}}-{{.BUILD_DIR}} >/dev/null 2>&1 || true
      - docker create --name {{.CONTAINER_NAME}}-{{.BUILD_DIR}} --label {{.LABEL}} {{.IMAGE_TAG}} >/dev/null 2>&1
      - echo "Extracting {{.BUILD_DIR}}..."
      - docker cp {{.CONTAINER_NAME}}-{{.BUILD_DIR}}:/build/grout {{.BUILD_DIR}}/grout
      - 'if [ -n "{{.LIB_PATH}}" ]; then docker cp {{.CONTAINER_NAME}}-{{.BUILD_DIR}}:{{.LIB_PATH}} {{.BUILD_DIR}}/lib/libSDL2_gfx-1.0.so.0; fi'
      - 'EXTRA_LIBS="{{.EXTRA_LIBS}}"; if [ -n "$EXTRA_LIBS" ]; then for spec in $EXTRA_LIBS; do src="${spec%%:*}"; dest="${spec##*:}"; docker cp {{.CONTAINER_NAME}}-{{.BUILD_DIR}}:$src {{.BUILD_DIR}}/lib/$dest; done; fi'
      - docker rm {{.CONTAINER_NAME}}-{{.BUILD_DIR}} >/dev/null 2>&1
      - docker image prune --filter "label={{.LABEL}}" -f >/dev/null 2>&1 || true
      - echo "Extract {{.BUILD_DIR}} complete"

  arm64:
    desc: Build and extract for ARM64
    vars:
      LOCAL: "false"
    cmds:
      - task: _build
        vars: { PLATFORM: linux/arm64, BUILD_DIR: build64, IMAGE_TAG: "{{.IMAGE_NAME}}-arm64", DOCKERFILE: docker/Dockerfile, LOCAL: "{{.LOCAL}}" }
      - task: _extract
        vars: { BUILD_DIR: build64, IMAGE_TAG: "{{.IMAGE_NAME}}-arm64", LIB_PATH: /usr/lib/aarch64-linux-gnu/libSDL2_gfx-1.0.so.0.0.2, EXTRA_LIBS: "" }

  amd64:
    desc: Build and extract for AMD64 (x86_64)
    cmds:
      - task: _build
        vars: { PLATFORM: linux/amd64, BUILD_DIR: build, IMAGE_TAG: "{{.IMAGE_NAME}}-amd64", DOCKERFILE: docker/Dockerfile }
      - task: _extract
        vars:
          BUILD_DIR: build
          IMAGE_TAG: "{{.IMAGE_NAME}}-amd64"
          LIB_PATH: /usr/lib/x86_64-linux-gnu/libSDL2_gfx-1.0.so.0.0.2
          EXTRA_LIBS: "/usr/lib/x86_64-linux-gnu/libSDL2-2.0.so.0.14.0:libSDL2-2.0.so.0 /usr/lib/x86_64-linux-gnu/libSDL2_image-2.0.so.0.2.3:libSDL2_image-2.0.so.0 /usr/lib/x86_64-linux-gnu/libSDL2_ttf-2.0.so.0.14.1:libSDL2_ttf-2.0.so.0 /usr/lib/x86_64-linux-gnu/libjpeg.so.62.3.0:libjpeg.so.62 /usr/lib/x86_64-linux-gnu/libpng16.so.16.37.0:libpng16.so.16 /usr/lib/x86_64-linux-gnu/libtiff.so.5.6.0:libtiff.so.5 /usr/lib/x86_64-linux-gnu/libwebp.so.6.0.2:libwebp.so.6 /usr/lib/x86_64-linux-gnu/libfreetype.so.6.17.4:libfreetype.so.6 /usr/lib/x86_64-linux-gnu/libbrotlidec.so.1.0.9:libbrotlidec.so.1 /usr/lib/x86_64-linux-gnu/libbrotlicommon.so.1.0.9:libbrotlicommon.so.1 /usr/lib/x86_64-linux-gnu/libzstd.so.1.4.8:libzstd.so.1 /lib/x86_64-linux-gnu/liblzma.so.5.2.5:liblzma.so.5 /usr/lib/x86_64-linux-gnu/libjbig.so.0:libjbig.so.0 /usr/lib/x86_64-linux-gnu/libdeflate.so.0:libdeflate.so.0 /lib/x86_64-linux-gnu/libz.so.1.2.11:libz.so.1"

  x86:
    desc: Build and extract for x86 (32-bit)
    cmds:
      - task: _build
        vars: { PLATFORM: linux/386, BUILD_DIR: buildx86, IMAGE_TAG: "{{.IMAGE_NAME}}-x86", DOCKERFILE: docker/Dockerfile }
      - task: _extract
        vars: { BUILD_DIR: buildx86, IMAGE_TAG: "{{.IMAGE_NAME}}-x86", LIB_PATH: /usr/lib/i386-linux-gnu/libSDL2_gfx-1.0.so.0.0.2, EXTRA_LIBS: "" }

  arm32:
    desc: Build and extract for ARM32
    vars:
      LOCAL: "false"
    cmds:
      - task: _build
        vars: { PLATFORM: linux/arm/v7, BUILD_DIR: build32, IMAGE_TAG: "{{.IMAGE_NAME}}-arm32", DOCKERFILE: docker/32.Dockerfile, LOCAL: "{{.LOCAL}}" }
      # TODO: add LIB_PATH once custom SDL build for Miyoo is ready
      - task: _extract
        vars: { BUILD_DIR: build32, IMAGE_TAG: "{{.IMAGE_NAME}}-arm32", LIB_PATH: "", EXTRA_LIBS: "" }
